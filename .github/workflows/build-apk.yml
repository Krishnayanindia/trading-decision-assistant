name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential autoconf autoconf-archive libtool libtoolize pkg-config m4

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython
        pip install -r requirements.txt

    - name: Build APK with Buildozer
      run: |
        cd ${{ github.workspace }}
        buildozer android debug

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: trading-app-apk
        path: bin/*.apk
        retention-days: 30

    - name: Create Release
      if: success()
      uses: softprops/action-gh-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v1.0-${{ github.run_number }}
        release_name: Trading App v1.0 Build ${{ github.run_number }}
        body: |
          ## Trading Decision Assistant APK

          **Build Details:**
          - Build #${{ github.run_number }}
          - Branch: ${{ github.ref }}
          - Commit: ${{ github.sha }}

          **Download APK from Artifacts or Assets**

          ### Installation:
          1. Download the APK file
          2. Enable "Unknown Sources" in phone Settings
          3. Install the APK
          4. Launch "Trading Decision Assistant"

          ### Features:
          - Real-time stock/ETF analysis
          - RSI & Stochastic indicators
          - Trading decision signals
          - Auto-refresh every 30 seconds
